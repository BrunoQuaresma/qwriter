name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.23'

    - name: Test
      env:
        QWRITER_OPENAI_KEY: ${{ secrets.QWRITER_OPENAI_KEY }}
      run: go test -v ./...

    - name: Build
      run: make build/qwriter

    - name: Archive build
      uses: actions/upload-artifact@v4
      with:
        name: build
        path: build/qwriter